name: 🔍 Check v18 config
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Check v18 vs pro
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?limit=20" > /tmp/p.json
          V18=$(python3 -c "import json; [print(p['id']) for p in json.load(open('/tmp/p.json')).get('projects',[]) if p['name']=='aureus-social-v18']")
          PRO=$(python3 -c "import json; [print(p['id']) for p in json.load(open('/tmp/p.json')).get('projects',[]) if p['name']=='aureus-social-pro']")
          
          # Config complète
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects/$V18" > /tmp/v18_full.json
          
          # Dernier déploiement en erreur avec events
          LAST_ERR=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$V18&limit=1&state=ERROR" | \
            python3 -c "import json,sys; deps=json.load(sys.stdin).get('deployments',[]); print(deps[0]['uid'] if deps else '')")
          
          echo "Last error: $LAST_ERR"
          
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v2/deployments/$LAST_ERR/events?limit=200" > /tmp/events.json
          
          python3 - /tmp/v18_full.json /tmp/events.json << 'PY'
          import json, sys
          
          v18 = json.load(open(sys.argv[1]))
          events_raw = open(sys.argv[2]).read()
          
          result = ["## V18 Config"]
          for k in ['framework','buildCommand','outputDirectory','installCommand','nodeVersion','rootDirectory','gitSource','latestDeployments']:
              val = v18.get(k)
              if k == 'latestDeployments':
                  for d in (val or [])[:2]:
                      result.append(f"  deploy: {d.get('uid')} {d.get('state')} {d.get('errorMessage','')}")
              else:
                  result.append(f"  {k}: {val}")
          
          result.append("\n## Build errors")
          for line in events_raw.splitlines():
              try:
                  d = json.loads(line)
                  p = d.get('payload', {})
                  text = p.get('text', '') if isinstance(p, dict) else str(p)
                  if text and ('error' in text.lower() or 'Error' in text):
                      result.append(f"  {text[:400]}")
              except: pass
          
          output = "\n".join(result[:50])
          print(output)
          open("VERCEL_CFG.txt", "w").write(output)
          PY
          
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add VERCEL_CFG.txt
          git diff --staged --quiet || (git commit -m "📊 Config check" && git push)
