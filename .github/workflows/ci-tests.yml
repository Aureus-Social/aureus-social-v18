# ═══════════════════════════════════════════════════════
# AUREUS SOCIAL PRO — Smoke Tests E2E
# Lancé manuellement (TEST_EMAIL requis dans Secrets)
# ═══════════════════════════════════════════════════════

name: 🧪 Smoke Tests E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'  # Chaque lundi 07:00 UTC

jobs:
  smoke-tests:
    name: Tests Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      AUREUS_TEST_PASS: ${{ secrets.AUREUS_TEST_PASS }}
      TEST_URL: https://app.aureussocial.be

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npx playwright test tests/smoke.spec.js --reporter=html
        continue-on-error: true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          echo "## 🧪 Smoke Tests" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://app.aureussocial.be" >> $GITHUB_STEP_SUMMARY
          echo "Rapport: voir artifact smoke-report-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
