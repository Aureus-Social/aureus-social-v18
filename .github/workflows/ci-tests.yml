name: 🧪 Aureus Social — CI Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        env:
          TEST_URL: ${{ secrets.STAGING_URL || 'https://app.aureussocial.be' }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          AUREUS_TEST_PASS: ${{ secrets.AUREUS_TEST_PASS }}
        run: npx playwright test tests/smoke.spec.js --reporter=html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()   # Uploader même en cas d'échec
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Smoke tests échoués** — Vérifier le rapport avant de merger. [Voir les logs](' + context.payload.repository.html_url + '/actions/runs/' + context.runId + ')'
            })
