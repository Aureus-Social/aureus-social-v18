name: 🧪 Aureus Social — CI Tests

on:
  workflow_dispatch:  # Manuel uniquement pour l'instant

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        env:
          TEST_URL: ${{ secrets.STAGING_URL || 'https://app.aureussocial.be' }}
        run: npx playwright test tests/smoke.spec.js --reporter=list

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
