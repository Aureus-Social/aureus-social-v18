name: 🔧 Fix Vercel v18 deployment
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Diagnose and fix
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Récupérer settings des 2 projets
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?limit=20" > /tmp/projects.json
          
          V18_ID=$(python3 -c "import json; [print(p['id']) for p in json.load(open('/tmp/projects.json')).get('projects',[]) if p['name']=='aureus-social-v18']")
          PRO_ID=$(python3 -c "import json; [print(p['id']) for p in json.load(open('/tmp/projects.json')).get('projects',[]) if p['name']=='aureus-social-pro']")
          
          echo "V18=$V18_ID PRO=$PRO_ID"
          
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects/$V18_ID" > /tmp/v18.json
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects/$PRO_ID" > /tmp/pro.json
          
          python3 - /tmp/v18.json /tmp/pro.json << 'PYEOF2'
          import json, sys
          v18 = json.load(open(sys.argv[1]))
          pro = json.load(open(sys.argv[2]))
          keys = ['framework','buildCommand','outputDirectory','installCommand','nodeVersion','rootDirectory']
          result = ["## aureus-social-v18"]
          for k in keys: result.append(f"  {k}: {v18.get(k)}")
          result.append("\n## aureus-social-pro")
          for k in keys: result.append(f"  {k}: {pro.get(k)}")
          text = "\n".join(result)
          print(text)
          open("VERCEL_DIAG.txt","w").write(text)
          PYEOF2
          
          cat VERCEL_DIAG.txt
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add VERCEL_DIAG.txt
          git diff --staged --quiet || git commit -m "📊 Diag Vercel" && git push
