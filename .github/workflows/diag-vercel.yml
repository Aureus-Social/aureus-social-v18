name: 🔧 Fix Vercel v18 deployment
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Get error details
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?limit=20" > /tmp/projects.json
          V18_ID=$(python3 -c "import json; [print(p['id']) for p in json.load(open('/tmp/projects.json')).get('projects',[]) if p['name']=='aureus-social-v18']")
          
          echo "=== Deployments en erreur ==="
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$V18_ID&limit=5&state=ERROR" > /tmp/deps.json
          
          python3 - /tmp/deps.json << 'PY'
          import json, sys, urllib.request, os
          deps = json.load(open(sys.argv[1]))
          token = os.environ['TOKEN']
          result = []
          for dep in deps.get('deployments', [])[:3]:
              uid = dep.get('uid', '')
              state = dep.get('state', '')
              err = dep.get('errorMessage', '') or dep.get('errorCode', '')
              created = dep.get('createdAt', '')
              result.append(f"UID: {uid} | State: {state} | Error: {err} | Created: {created}")
              
              # Récupérer les build events
              if uid:
                  req = urllib.request.Request(
                      f"https://api.vercel.com/v2/deployments/{uid}/events?limit=50",
                      headers={"Authorization": f"Bearer {token}"}
                  )
                  try:
                      with urllib.request.urlopen(req, timeout=10) as r:
                          for line in r.read().decode().splitlines():
                              try:
                                  d = json.loads(line)
                                  t = d.get('type', '')
                                  p = d.get('payload', {})
                                  text = p.get('text', '') if isinstance(p, dict) else str(p)
                                  if 'error' in text.lower() or 'Error' in text or t == 'stderr':
                                      result.append(f"  [{t}] {text[:300]}")
                              except: pass
                  except Exception as e:
                      result.append(f"  Events non dispo: {e}")
                  break  # Juste le premier
          
          output = "\n".join(result)
          print(output)
          open("VERCEL_DIAG.txt", "w").write(output)
          PY
          
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add VERCEL_DIAG.txt
          git diff --staged --quiet || (git commit -m "📊 Error details" && git push)
