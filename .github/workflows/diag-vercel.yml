name: 🔧 Fix Vercel v18 deployment
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose and fix aureus-social-v18
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "Token défini: $([ -n "$TOKEN" ] && echo OUI || echo NON)"
          echo "Token length: ${#TOKEN}"
          
          # Test API
          RESP=$(curl -s -w "\nHTTP:%{http_code}" -H "Authorization: Bearer $TOKEN"             "https://api.vercel.com/v2/user")
          echo "API response: $(echo $RESP | tail -c 100)"
          
          # Si OK, récupérer les projets
          HTTP=$(echo "$RESP" | grep "HTTP:" | cut -d: -f2)
          if [ "$HTTP" = "200" ]; then
            echo "=== API OK ==="
            curl -sf -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?limit=20" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for p in d.get("projects",[]):
              print(p["name"], p["id"])
          "
          fi
