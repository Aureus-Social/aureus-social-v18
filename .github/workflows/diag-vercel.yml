name: 🔧 Fix Vercel v18 deployment
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diagnose and fix aureus-social-v18
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PROJECTS=$(curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?limit=20")
          V18_ID=$(echo "$PROJECTS" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for p in d.get('projects',[]): 
              if p['name']=='aureus-social-v18': print(p['id'])
          ")
          PRO_ID=$(echo "$PROJECTS" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              if p['name']=='aureus-social-pro': print(p['id'])
          ")
          
          {
            echo "# Diagnostic Vercel $(date)"
            echo ""
            echo "## aureus-social-v18 Settings"
            curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects/$V18_ID" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for k in ['framework','buildCommand','outputDirectory','installCommand','nodeVersion','rootDirectory']:
              print(f'{k}: {d.get(k)}')
          "
            echo ""
            echo "## aureus-social-pro Settings"
            curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects/$PRO_ID" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for k in ['framework','buildCommand','outputDirectory','installCommand','nodeVersion','rootDirectory']:
              print(f'{k}: {d.get(k)}')
          "
            echo ""
            echo "## Last deployments v18"
            curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v6/deployments?projectId=$V18_ID&limit=3" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for dep in d.get('deployments',[]):
              print(dep.get('uid'), dep.get('state'), dep.get('errorMessage','') or dep.get('errorCode','no error'))
          "
          } > /tmp/diag_result.txt
          
          cat /tmp/diag_result.txt
          
          # Écrire dans le repo
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          cp /tmp/diag_result.txt VERCEL_DIAG.txt
          git add VERCEL_DIAG.txt
          git commit -m "📊 Diagnostic Vercel" || true
          git push
