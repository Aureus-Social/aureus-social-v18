name: 🔧 Fix Vercel v18 deployment
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fix env vars + ESLint
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?limit=20" > /tmp/projects.json
          V18_ID=$(python3 -c "import json; [print(p['id']) for p in json.load(open('/tmp/projects.json')).get('projects',[]) if p['name']=='aureus-social-v18']")
          PRO_ID=$(python3 -c "import json; [print(p['id']) for p in json.load(open('/tmp/projects.json')).get('projects',[]) if p['name']=='aureus-social-pro']")
          
          echo "V18=$V18_ID PRO=$PRO_ID"
          
          # Lire toutes les vars de aureus-social-pro avec valeurs déchiffrées
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects/$PRO_ID/env?decrypt=true" > /tmp/pro_vars.json
          
          # Lire vars existantes de v18
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects/$V18_ID/env" > /tmp/v18_vars.json
          
          # Comparer et ajouter les manquantes
          python3 - /tmp/pro_vars.json /tmp/v18_vars.json /tmp/projects.json << 'PY'
          import json, sys, urllib.request, os
          
          token = os.environ['TOKEN']
          pro_vars = {e['key']: e.get('value','') for e in json.load(open(sys.argv[1])).get('envs',[])}
          v18_vars = {e['key']: e['id'] for e in json.load(open(sys.argv[2])).get('envs',[])}
          projects = json.load(open(sys.argv[3]))
          v18_id = next(p['id'] for p in projects.get('projects',[]) if p['name']=='aureus-social-v18')
          
          to_add = []
          for key, value in pro_vars.items():
              if key not in v18_vars and value:
                  to_add.append((key, value))
          
          print(f"Variables manquantes sur v18: {[k for k,v in to_add]}")
          
          for key, value in to_add:
              payload = json.dumps({
                  "key": key, "value": value,
                  "type": "encrypted",
                  "target": ["production","preview","development"]
              }).encode()
              req = urllib.request.Request(
                  f"https://api.vercel.com/v9/projects/{v18_id}/env",
                  data=payload,
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
                  method="POST"
              )
              with urllib.request.urlopen(req) as r:
                  print(f"  ADDED: {key} → HTTP {r.status}")
          
          print("Done ✅")
          PY
          
          echo "=== Vérification finale ==="
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects/$V18_ID/env" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          keys=[e['key'] for e in d.get('envs',[])]
          print(f'Total vars: {len(keys)}')
          for k in sorted(keys): print(f'  {k}')
          " > VERCEL_DIAG.txt
          cat VERCEL_DIAG.txt
          
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add VERCEL_DIAG.txt
          git diff --staged --quiet || (git commit -m "📊 Vars v18 après fix" && git push)
