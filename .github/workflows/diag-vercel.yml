name: 🔧 Fix Vercel v18 deployment
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose and fix aureus-social-v18
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "=== TEST TOKEN ==="
          RESP=$(curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v2/user" || echo "CURL_FAILED")
          echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print('User:', d.get('user',{}).get('email','?'))" 2>/dev/null || echo "Token invalide ou expiré: $RESP"
          
          echo "=== PROJETS ==="
          PROJECTS=$(curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?limit=20" || echo "{}")
          echo "$PROJECTS" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              print(p['name'], '→', p['id'])
          " 2>/dev/null || echo "Erreur projets: $PROJECTS"
          
          V18_ID=$(echo "$PROJECTS" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              if p['name']=='aureus-social-v18': print(p['id'])
          " 2>/dev/null || echo "")
          
          if [ -z "$V18_ID" ]; then
            echo "Projet v18 non trouvé"
            exit 1
          fi
          
          echo "=== LAST DEPLOYMENTS ==="
          curl -s -H "Authorization: Bearer $TOKEN"             "https://api.vercel.com/v6/deployments?projectId=$V18_ID&limit=3" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for dep in d.get('deployments',[]):
              print(dep.get('uid'), dep.get('state'), dep.get('errorMessage','') or dep.get('errorCode',''))
          " 2>/dev/null || echo "Erreur déploiements"
          
          echo "=== REDEPLOY ==="
          LAST_SHA=$(curl -s -H "Authorization: Bearer $TOKEN"             "https://api.vercel.com/v6/deployments?projectId=$V18_ID&limit=1" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          deps=d.get('deployments',[])
          if deps: print(deps[0].get('meta',{}).get('githubCommitSha',''))
          " 2>/dev/null || echo "")
          
          echo "Last SHA: $LAST_SHA"
          
          # Forcer un redeploy
          REDEPLOY=$(curl -s -X POST             -H "Authorization: Bearer $TOKEN"             -H "Content-Type: application/json"             -d "{"name":"aureus-social-v18","project":"$V18_ID","target":"production","gitSource":{"type":"github","repoId":"Aureus-Social/aureus-social-v18","ref":"main"}}"             "https://api.vercel.com/v13/deployments" || echo "{}")
          echo "$REDEPLOY" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print('Redeploy:', d.get('id',''), d.get('url',''), d.get('error',{}).get('message',''))
          " 2>/dev/null || echo "Redeploy réponse: $REDEPLOY"
