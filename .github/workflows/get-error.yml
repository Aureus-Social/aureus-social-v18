name: 🔧 Get error
on:
  workflow_dispatch:
jobs:
  err:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Get last error
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?limit=20" > /tmp/p.json
          V18=$(python3 -c "import json; [print(p['id']) for p in json.load(open('/tmp/p.json')).get('projects',[]) if p['name']=='aureus-social-v18']")
          
          LAST_UID=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$V18&limit=1&state=ERROR" | \
            python3 -c "import json,sys; deps=json.load(sys.stdin).get('deployments',[]); print(deps[0]['uid'] if deps else '')")
          
          echo "Last error UID: $LAST_UID"
          
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v2/deployments/$LAST_UID/events?limit=100" | \
            python3 -c "
          import json,sys
          errors=[]
          for line in sys.stdin.read().splitlines():
              try:
                  d=json.loads(line)
                  p=d.get(\"payload\",{})
                  text=p.get(\"text\",\"\") if isinstance(p,dict) else str(p)
                  if text and (\"error\" in text.lower() or \"Error\" in text or \"FAIL\" in text):
                      errors.append(text[:300])
              except: pass
          output=\"\n\".join(errors[:20])
          print(output)
          open(\"VERCEL_ERR.txt\",\"w\").write(output)
          "
          
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add VERCEL_ERR.txt
          git diff --staged --quiet || (git commit -m "📊 Error log" && git push)
