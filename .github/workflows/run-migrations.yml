name: 🗄️ Aureus — Run SQL Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Taper YES pour confirmer'
        required: true
        default: 'NO'

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'YES' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pg
        run: npm install pg

      - name: Run migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: node scripts/run-migrations.js

      - name: Migration complete
        run: echo "✅ Migrations exécutées avec succès"
