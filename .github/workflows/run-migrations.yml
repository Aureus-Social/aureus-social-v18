name: "Aureus Run SQL Migrations"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Taper YES pour confirmer"
        required: true
        default: "NO"

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'YES' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run migrations via psql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Execution des migrations SQL..."
          psql "$SUPABASE_DB_URL" -f docs/sql_migration_complete.sql
          echo "Migration terminee"

      - name: Verify tables
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Tables dans public schema:"
          psql "$SUPABASE_DB_URL" -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' ORDER BY table_name;"
