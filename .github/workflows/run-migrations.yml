name: "Auto SQL Migrations"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "YES pour confirmer"
        required: true
        default: "NO"

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'YES' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install psql
        run: sudo apt-get install -y postgresql-client
      - name: Run migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -f docs/sql_auto_migrations.sql
          echo "Migrations done"
