name: 🔧 Setup Vercel Env Vars (one-shot)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Configurer toutes les env vars Vercel
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -e
          
          echo "=== Récupération des projets ==="
          PROJECTS=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects?limit=20")
          
          V18_ID=$(echo "$PROJECTS" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              if p['name']=='aureus-social-v18': print(p['id'])
          ")
          PRO_ID=$(echo "$PROJECTS" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              if p['name']=='aureus-social-pro': print(p['id'])
          ")
          
          echo "aureus-social-v18: $V18_ID"
          echo "aureus-social-pro: $PRO_ID"
          
          echo "=== Lecture vars depuis aureus-social-pro ==="
          PRO_VARS=$(curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://api.vercel.com/v9/projects/$PRO_ID/env?decrypt=true")
          
          get_val() {
            echo "$PRO_VARS" | python3 -c "
          import json,sys
          key='$1'
          d=json.load(sys.stdin)
          for e in d.get('envs',[]):
              if e['key']==key:
                  v=e.get('value','')
                  print(v)
                  break
          "
          }
          
          SUPABASE_SRK=$(get_val SUPABASE_SERVICE_ROLE_KEY)
          ONSS_PK=$(get_val ONSS_PRIVATE_KEY)
          ONSS_CID=$(get_val ONSS_CLIENT_ID)
          ENC_KEY=$(get_val ENCRYPTION_KEY)
          ANTHRO=$(get_val ANTHROPIC_API_KEY)
          SB_ANON=$(get_val NEXT_PUBLIC_SUPABASE_ANON_KEY)
          SB_URL=$(get_val NEXT_PUBLIC_SUPABASE_URL)
          MAIL_U=$(get_val MAIL_USER)
          MAIL_P=$(get_val MAIL_PASSWORD)
          
          echo "Variables lues ✅"
          
          add_or_update() {
            local PID=$1
            local KEY=$2
            local VALUE=$3
            
            EXISTING=$(curl -sf -H "Authorization: Bearer $TOKEN" \
              "https://api.vercel.com/v9/projects/$PID/env" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for e in d.get('envs',[]):
              if e['key']=='$KEY': print(e['id']); break
          " 2>/dev/null || echo "")
            
            PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({
              'key': '$KEY',
              'value': '''$VALUE''',
              'type': 'encrypted',
              'target': ['production','preview','development']
          }))
          ")
            
            if [ -n "$EXISTING" ]; then
              curl -sf -X PATCH \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" \
                "https://api.vercel.com/v9/projects/$PID/env/$EXISTING" > /dev/null
              echo "  UPDATED: $KEY"
            else
              curl -sf -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" \
                "https://api.vercel.com/v9/projects/$PID/env" > /dev/null
              echo "  ADDED: $KEY"
            fi
          }
          
          echo ""
          echo "=== Mise à jour aureus-social-v18 ==="
          add_or_update "$V18_ID" "SUPABASE_SERVICE_ROLE_KEY" "$SUPABASE_SRK"
          add_or_update "$V18_ID" "ONSS_PRIVATE_KEY"          "$ONSS_PK"
          add_or_update "$V18_ID" "ONSS_CLIENT_ID"            "$ONSS_CID"
          add_or_update "$V18_ID" "ENCRYPTION_KEY"            "$ENC_KEY"
          add_or_update "$V18_ID" "ANTHROPIC_API_KEY"         "$ANTHRO"
          add_or_update "$V18_ID" "NEXT_PUBLIC_SUPABASE_ANON_KEY" "$SB_ANON"
          add_or_update "$V18_ID" "NEXT_PUBLIC_SUPABASE_URL"  "$SB_URL"
          add_or_update "$V18_ID" "MAIL_USER"                 "$MAIL_U"
          add_or_update "$V18_ID" "MAIL_PASSWORD"             "$MAIL_P"
          add_or_update "$V18_ID" "CRON_SECRET"               "LhxbcikhGitsTMM+CeNIoVc7TJqKjZOdStJVTBZo2Ms="
          add_or_update "$V18_ID" "NEXT_PUBLIC_CRYPTO_SALT"   "vQctmr+t0Tkphs15QExqzmtw9T2Y3Vd0wz3mS+/nRS0="
          
          echo ""
          echo "=== Mise à jour aureus-social-pro ==="
          add_or_update "$PRO_ID" "CRON_SECRET"               "LhxbcikhGitsTMM+CeNIoVc7TJqKjZOdStJVTBZo2Ms="
          add_or_update "$PRO_ID" "NEXT_PUBLIC_CRYPTO_SALT"   "vQctmr+t0Tkphs15QExqzmtw9T2Y3Vd0wz3mS+/nRS0="
          
          echo ""
          echo "✅ TOUT EST CONFIGURÉ SUR LES 2 PROJETS"
