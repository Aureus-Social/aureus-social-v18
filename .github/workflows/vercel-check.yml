name: Vercel Config Check
on:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Vercel project config
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PROJECTS=$(curl -sf -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?limit=20")
          echo "=== Projets ==="
          echo "$PROJECTS" | python3 -c "import json,sys; [print(p['name'], p['id'], p.get('framework','?'), p.get('rootDirectory','root')) for p in json.load(sys.stdin).get('projects',[])]"
          
          V18_ID=$(echo "$PROJECTS" | python3 -c "import json,sys; [print(p['id']) for p in json.load(sys.stdin).get('projects',[]) if p['name']=='aureus-social-v18']")
          echo "V18 ID: $V18_ID"
          
          DEPLOYS=$(curl -sf -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v6/deployments?projectId=$V18_ID&limit=3")
          echo "=== Deployments ==="
          echo "$DEPLOYS" | python3 -c "import json,sys; [print(d.get('state'), d.get('url',''), d.get('errorMessage','no error')) for d in json.load(sys.stdin).get('deployments',[])]"
