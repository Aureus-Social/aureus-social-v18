name: Vercel Config Check
on:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Vercel project config
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROJECTS=$(curl -sf -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?limit=20")
          
          V18_ID=$(echo "$PROJECTS" | python3 -c "import json,sys; [print(p['id']) for p in json.load(sys.stdin).get('projects',[]) if p['name']=='aureus-social-v18']")
          V18_INFO=$(echo "$PROJECTS" | python3 -c "import json,sys; [print(json.dumps({'framework':p.get('framework'),'rootDir':p.get('rootDirectory'),'nodeVer':p.get('nodeVersion'),'buildCmd':p.get('buildCommand'),'outputDir':p.get('outputDirectory')})) for p in json.load(sys.stdin).get('projects',[]) if p['name']=='aureus-social-v18']")
          
          DEPLOYS=$(curl -sf -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v6/deployments?projectId=$V18_ID&limit=3")
          LAST_ERROR=$(echo "$DEPLOYS" | python3 -c "import json,sys; deps=json.load(sys.stdin).get('deployments',[]); print(deps[0].get('errorMessage','no error') if deps else 'no deploys')")
          LAST_STATE=$(echo "$DEPLOYS" | python3 -c "import json,sys; deps=json.load(sys.stdin).get('deployments',[]); print(deps[0].get('state','?') if deps else '?')")
          
          echo "INFO: $V18_INFO"
          echo "LAST_STATE: $LAST_STATE"
          echo "LAST_ERROR: $LAST_ERROR"
          
          # Ecrire dans un fichier du repo
          cat > /tmp/vercel_result.txt << EOF
V18_INFO=$V18_INFO
LAST_STATE=$LAST_STATE
LAST_ERROR=$LAST_ERROR
EOF
          
          # Pusher le fichier dans le repo
          CONTENT=$(base64 -w0 /tmp/vercel_result.txt)
          curl -sf -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"📊 Vercel config result\",\"content\":\"$CONTENT\"}" \
            "https://api.github.com/repos/Aureus-Social/aureus-social-v18/contents/VERCEL_CFG.txt" || true
          
          echo "Done"
